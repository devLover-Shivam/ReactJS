<!-- ### What is `type="module"`?

The `type="module"` attribute tells the browser to treat the JavaScript file as an **ES Module**. This enables the use of modern JavaScript features such as `import` and `export`.

```html
<script type="module" src="script.js"></script>
```

#### Benefits

* Allows the use of `import` and `export`.
* Keeps variables scoped to their own file (module scope).
* Enables strict mode automatically.
* Loads scripts efficiently using deferred execution.

#### Example

```javascript
// data.js
export const age = 20;
```

```javascript
// script.js
import { age } from "./data.js";

console.log(age);
```

Without `type="module"`, the browser would not understand the `import` and `export` statements.
